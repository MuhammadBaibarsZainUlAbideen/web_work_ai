<!DOCTYPE html>
<html>
<head>
  <title>Payment Cancelled</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f4fb;
      padding: 2rem 1rem;
    }
    .card {
      width: 100%;
      max-width: 400px;
      background: #fff;
      border-radius: 20px;
      border: 1px solid #e8e7f5;
      padding: 2.5rem 2rem;
      text-align: center;
    }
    .icon-wrap {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #FCEBEB;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }
    h1 {
      font-size: 22px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 0.5rem;
    }
    p {
      font-size: 14px;
      color: #666;
      line-height: 1.6;
      margin-bottom: 1.75rem;
    }
    .btn-primary {
      display: block;
      width: 100%;
      padding: 13px;
      background: #534AB7;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      margin-bottom: 10px;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: #3C3489; }
    .btn-secondary {
      display: block;
      width: 100%;
      padding: 13px;
      background: transparent;
      color: #534AB7;
      border: 1px solid #d0cef5;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }
    .btn-secondary:hover { background: #f5f4fb; }
  </style>
</head>
<body>
  <div class="card">

    <div class="icon-wrap">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <path d="M8 8L20 20M20 8L8 20" stroke="#E24B4A" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>

    <h1>Payment cancelled</h1>
    <p>No worries — you haven't been charged.<br>Your spot is still here whenever you're ready.</p>

    <button id="retryBtn" class="btn-primary">Try again</button>

    <script>
        document.getElementById("retryBtn").onclick = () => {
          
            const params = new URLSearchParams(window.location.search);
            const session_id = params.get("session_id");
            window.location.href = `http://localhost:8004/stripe.html?session_id=${session_id}`;
        };
    </script>
    

  </div>
</body>
</html>
