<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <style>
        table {
            border-collapse: collapse;
            width: 80%;
            margin: 20px auto;
        }
        th, td {
            border: 1px solid #333;
            padding: 8px 12px;
            text-align: left;
        }
        th {
            background-color: #555;
            color: white;
        }
        .active {
            color: green;
            font-weight: bold;
        }
        .inactive {
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1 style="text-align:center;">Admin Dashboard</h1>
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Token Status</th>
                <th>Payment Status</th>
                <th>Tries</th>
            </tr>
        </thead>
        <tbody id="adminTable">
            <!-- Data will be inserted here -->
        </tbody>
    </table>

    <script src="admin.js"></script>
</body>
</html>
