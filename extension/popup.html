<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="marked.min.js"></script>
    <script src="katex.min.js"></script>
    <link rel="stylesheet" href="katex.min.css">
   


    <meta charset="UTF-8">
</head>
<body>
    <div class="container">
        <div id="toast" class="toast">Logged out successfully</div>
        <div class="top-bar">
            <div class="Title">
                <h2>Simple Solver</h2>

            </div>
            
            <button id="gearBtn"><i class="fas fa-gear"></i></button>
        </div>
        <div class="buttons">
        
                <button id="solve">Solve Now</button>
                <button id="LS" style="display:none">LoginIn/SignUp</button>
                <!-- <button id="Logout" >Logout</button> -->
                <button id="upgrade" i class="fas fa-lock-open">Go Premimum</button>
                <!-- <button id="sub">Manage Subscrption</button> -->
        </div>
        

        <div id="result"></div>


        <div id="chatBox" class="chat-box"></div>

        <div class="chat-input-area">
            <input id="chatInput" type="text" placeholder="Ask something..." />
            <button id="sendBtn">Send</button>
        </div>

        
        
    </div>
        <div id="settingsDropdown" class="settings-dropdown">

        <div class="settings-item" id="sub">
            Manage Subscription
        </div>

        <div class="settings-item" id="Logout">
            Logout
        </div>

    </div>

    


    <script type="module" src="popup.js"></script>
    <script type="module" src="send_message.js"></script>
    <script src="auto-render.min.js"></script>
    <script src="Auth.js"></script>
    <script src="logout.js"></script>
    <script src="manage_subscrption.js"></script>
    <script src="dropdown.js"></script>
    
     


</body>
</html>
