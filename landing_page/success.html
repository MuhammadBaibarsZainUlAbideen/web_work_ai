<!DOCTYPE html>
<html>
<head>
  <title>Payment Successful</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f4fb;
      padding: 2rem 1rem;
    }
    .card {
      width: 100%;
      max-width: 400px;
      background: #fff;
      border-radius: 20px;
      border: 1px solid #e8e7f5;
      overflow: hidden;
      text-align: center;
    }
    .card-top {
      background: #534AB7;
      padding: 2.25rem 2rem 2rem;
    }
    .icon-wrap {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(255,255,255,0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.25rem;
    }
    .card-top h1 {
      font-size: 22px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 0.4rem;
    }
    .card-top p {
      font-size: 14px;
      color: rgba(255,255,255,0.75);
      line-height: 1.6;
    }
    .perks {
      padding: 1.5rem 2rem;
      border-bottom: 1px solid #f0effe;
    }
    .perk {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
    }
    .perk-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #534AB7;
      flex-shrink: 0;
    }
    .perk span {
      font-size: 14px;
      color: #444;
    }

    .btn-primary {
      display: block;
      width: 100%;
      padding: 13px;
      background: #534AB7;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: #3C3489; }
    .note {
      font-size: 12px;
      color: #999;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="card-top">
      <div class="icon-wrap">
        <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
          <path d="M6 15L12 21L24 9" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h1>You're all set!</h1>
      <p>Your 1 months memebership is ready now<br>Welcome to the club.</p>
    </div>

    <div class="perks">
      <div class="perk">
        <div class="perk-dot"></div>
        <span>Valid for 1 month — no renewals</span>
      </div>
      <div class="perk">
        <div class="perk-dot"></div>
        <span>Flagship model — best explanations</span>
      </div>
    </div>


  </div>
</body>
</html>
